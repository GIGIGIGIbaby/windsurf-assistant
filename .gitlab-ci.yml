# .gitlab-ci.yml · 万源VM · GitLab CI · 印273
# ══════════════════════════════════════════════════════════════
# GitLab.com镜像此repo后自动触发 · 400分钟/月 · 公开项目免费
#
# 激活步骤:
#   1. gitlab.com → 新建项目 → Import → GitHub → 选 zhouyoukang/windsurf-assistant
#   2. Settings → Repository → Mirroring → Pull from GitHub (自动同步)
#   3. CI/CD → Variables → 添加 GH_TOKEN (GitHub PAT · write_repository)
#   4. CI/CD → Schedules → 每55分钟 → 自动永续
#
# 「损之又损，以至于无为，无为而无不为」── 帛书老子
# ══════════════════════════════════════════════════════════════

image: node:22-bookworm

variables:
  VM_SLOT: gitlab
  DURATION_MIN: "50"

stages:
  - vm

dao-vm:
  stage: vm
  timeout: 60 minutes
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget curl
    - wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
        -O /usr/local/bin/cloudflared && chmod +x /usr/local/bin/cloudflared
    - echo "Node $(node -v) | cf $(cloudflared --version | head -1)"
  script:
    - bash scripts/dao_vm_gha_bootstrap.sh gitlab 50
  after_script:
    - |
      if [ -n "$GITLAB_TOKEN" ] && [ -n "$CI_PROJECT_ID" ]; then
        curl -sf -X POST "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/pipeline" \
          -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"ref":"main"}' && echo "next pipeline triggered" || echo "trigger failed"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  retry: 0
