# azure-pipelines.yml · dao-vm loop · 印274
# 「損之又損，以至于無為，無為而無不為。」── 帛书老子
# Azure Pipelines: 1800min/月 · 2vCPU/7GB · 公开项目免费
# 每55min自触发 → 永续在线

trigger:
  - main

schedules:
  - cron: "0 */1 * * *"
    displayName: "每小时保活触发"
    branches:
      include:
        - main
    always: true

pool:
  vmImage: "ubuntu-latest"

variables:
  VM_SLOT: "azure"
  DURATION_MIN: "55"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: "Setup Node.js 22"

  - script: |
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
        -O /tmp/cloudflared && chmod +x /tmp/cloudflared
      sudo mv /tmp/cloudflared /usr/local/bin/cloudflared
      cloudflared --version
    displayName: "Install cloudflared"

  - script: |
      bash scripts/dao_vm_gha_bootstrap.sh azure 55
    displayName: "Start VM + Tunnel"
    timeoutInMinutes: 60
    env:
      GITHUB_TOKEN: "$(GH_TOKEN)"
      VM_SLOT: "azure"

  - script: |
      curl -sf -X POST \
        -H "Authorization: Basic $(echo -n :$(AZURE_TOKEN) | base64)" \
        -H "Content-Type: application/json" \
        "$(System.CollectionUri)$(System.TeamProject)/_apis/build/builds?api-version=7.1" \
        -d "{\"definition\":{\"id\":$(System.DefinitionId)},\"sourceBranch\":\"refs/heads/main\"}" \
        && echo "Next build triggered" || echo "Trigger failed (schedule covers)"
    displayName: "Trigger next pipeline"
    condition: always()
