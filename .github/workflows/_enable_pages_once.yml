name: Enable Pages (one-time bootstrap · 印 69)

# 印 69 · 道氾呵其可左右也 · 突破 GITHUB_TOKEN 不能启 Pages 之硬规
#
# actions/configure-pages 用 build_type='workflow' 需 administration:write
# (GITHUB_TOKEN 不能拿此 scope · 仅 PAT 可) → 故 enablement:true 不工作.
#
# 但 GitHub REST API POST /repos/{owner}/{repo}/pages 当 build_type='legacy'
# 时仅需 pages:write 权限 (GITHUB_TOKEN 经 workflow permissions 可声明) ──
# 此为道之"右" · 一次性 workflow 自启 Pages legacy source · 之后任何 push
# 到 main 自动 redeploy /web · 完全无需手动 Settings 操作.
#
# 跑一次成功后 · workflow 可删 (印 69 后续 commit 会清理).

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/_enable_pages_once.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable:
    if: github.repository_owner == 'zhouyoukang'
    runs-on: ubuntu-latest
    steps:
      - name: Enable Pages (build_type=legacy · source=main:/web)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            // 先查现状
            let existing = null;
            try {
              const cur = await github.rest.repos.getPages({ owner, repo });
              existing = cur.data;
              core.info('Pages already enabled · current state:');
              core.info(JSON.stringify(existing, null, 2));
            } catch (e) {
              if (e.status !== 404) throw e;
              core.info('Pages not yet enabled · proceeding to create.');
            }

            if (!existing) {
              // 创 legacy Pages site (build_type=legacy · GITHUB_TOKEN 仅需 pages:write)
              try {
                const r = await github.rest.repos.createPagesSite({
                  owner, repo,
                  build_type: 'legacy',
                  source: { branch: 'main', path: '/web' }
                });
                core.info('✓ Pages enabled · legacy mode · source=main:/web');
                core.info(JSON.stringify(r.data, null, 2));
              } catch (e) {
                core.error('✗ createPagesSite failed: ' + e.status + ' · ' + e.message);
                if (e.status === 403) {
                  core.error('GITHUB_TOKEN 不足 · 需 PAT 走手动 Settings (README §0 印 69)');
                }
                throw e;
              }
            } else if (existing.build_type === 'workflow') {
              // 已是 Actions source · 不变 (兼印 67 之 deploy-pages.yml)
              core.info('Pages 现为 workflow build_type · 保留 (兼 deploy-pages.yml)');
            } else {
              // 已是 legacy 但可能 source 不对 · 更新
              const src = existing.source || {};
              if (src.branch !== 'main' || src.path !== '/web') {
                core.info('Pages legacy 但 source 不对 · 更新中...');
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner, repo,
                  source: { branch: 'main', path: '/web' }
                });
                core.info('✓ source 更新为 main:/web');
              } else {
                core.info('✓ Pages 已是 legacy source=main:/web · 无需变');
              }
            }

            // 触发 build (legacy mode push 后自动 build · 但保险显式触发)
            try {
              await github.rest.repos.requestPagesBuild({ owner, repo });
              core.info('✓ 显式 requestPagesBuild · 1-2 分钟内 deploy');
            } catch (e) {
              core.warning('requestPagesBuild 失败 (可能 push 已触发): ' + e.message);
            }