# appveyor.yml · dao-vm loop · 印275
# AppVeyor Free: 公开仓库无限 · 2vCPU/8GB Ubuntu · 无需CC
version: 印275-{build}
image: Ubuntu2204
environment:
  VM_SLOT: appveyor
  DURATION_MIN: 55
install:
  - wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
  - chmod +x /usr/local/bin/cloudflared
  - cloudflared --version
  - node --version
build_script:
  - bash scripts/dao_vm_gha_bootstrap.sh appveyor 55
branches:
  only:
    - main
    - master
