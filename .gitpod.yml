# .gitpod.yml · dao-vm · 印274
# 「无为而无不为」── 帛书老子
# Gitpod: 50h/月 · 4vCPU/8GB · 免费 · 无需CC

image:
  file: .gitpod.Dockerfile

tasks:
  - name: dao-vm server
    init: |
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
        -O /usr/local/bin/cloudflared && chmod +x /usr/local/bin/cloudflared
      echo "cloudflared ready"
    command: |
      export VM_SLOT=gitpod
      export GITHUB_TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
      bash scripts/dao_vm_gha_bootstrap.sh gitpod 3000 || true

ports:
  - port: 7862
    onOpen: notify
    visibility: public
  - port: 8080
    onOpen: ignore
    visibility: public

vscode:
  extensions: []
