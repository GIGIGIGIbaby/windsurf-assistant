<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>道·智能任务管家 · 印 161</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,Segoe UI,'PingFang SC',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;padding:16px}
h1{text-align:center;color:#60a5fa;margin-bottom:6px;font-size:1.5rem;font-weight:600}
.tagline{text-align:center;color:#64748b;font-size:.85rem;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1.6fr 1.2fr;gap:14px;max-width:1400px;margin:0 auto}
@media (max-width:1100px){.grid{grid-template-columns:1fr}}
.card{background:#111827;border-radius:10px;padding:16px;border:1px solid #1f2937}
.card h2{color:#60a5fa;margin-bottom:12px;font-size:1rem;border-bottom:1px solid #1f2937;padding-bottom:8px;display:flex;align-items:center;gap:8px}
.card h2 .badge{font-size:.7rem;background:#1e3a8a;color:#bfdbfe;padding:2px 8px;border-radius:4px;font-weight:400}
input,textarea,select{width:100%;padding:8px 10px;margin-bottom:8px;background:#0f172a;border:1px solid #1e293b;border-radius:6px;color:#e2e8f0;font-size:.85rem;font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:#3b82f6}
textarea{resize:vertical;min-height:50px}
button{padding:8px 14px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;transition:background .15s;margin-right:6px;margin-bottom:6px;font-family:inherit}
button:hover{background:#1d4ed8}
button.sec{background:#374151}
button.sec:hover{background:#4b5563}
button.dan{background:#7c2d12}
button.dan:hover{background:#9a3412}
button.ai{background:linear-gradient(90deg,#7c3aed,#2563eb)}
button.ai:hover{filter:brightness(1.15)}
button:disabled{opacity:.4;cursor:not-allowed}
.task{background:#0f172a;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #475569;transition:border-color .2s}
.task.done{opacity:.5}.task.done .info b{text-decoration:line-through}
.task.high{border-left-color:#ef4444}
.task.mid{border-left-color:#eab308}
.task.low{border-left-color:#22c55e}
.task .info{flex:1}
.task .info b{display:block;font-weight:600;color:#e2e8f0;margin-bottom:2px}
.task .info .desc{font-size:.78rem;color:#94a3b8;line-height:1.4}
.task .info .meta{font-size:.7rem;color:#64748b;margin-top:4px}
.task .actions{display:flex;gap:4px;margin-top:8px}
.task .actions button{padding:4px 10px;font-size:.75rem;margin:0}
.task-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2937;font-size:.85rem}
.stat-row:last-child{border:none}
.stat-val{font-weight:600;color:#60a5fa}
.bar{height:6px;background:#1f2937;border-radius:3px;margin:8px 0;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#10b981);transition:width .3s}
.chat{height:280px;overflow-y:auto;padding:10px;background:#0f172a;border-radius:6px;margin-bottom:8px;font-size:.82rem;border:1px solid #1e293b}
.chat .msg{margin-bottom:10px;padding:8px 10px;border-radius:6px;line-height:1.5}
.chat .msg.user{background:#1e293b;border-left:3px solid #60a5fa}
.chat .msg.ai{background:#0c1929;border-left:3px solid #a78bfa}
.chat .msg.err{background:#3f1f1f;border-left:3px solid #ef4444;color:#fca5a5}
.chat .msg .role{font-size:.7rem;color:#64748b;margin-bottom:3px;display:flex;justify-content:space-between}
.empty{color:#475569;text-align:center;padding:30px 0}
.health{display:flex;gap:6px;align-items:center;font-size:.78rem;padding:6px 0;border-bottom:1px solid #1f2937}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.g{background:#22c55e;box-shadow:0 0 4px #22c55e}
.dot.r{background:#ef4444}
.dot.y{background:#eab308}
code{background:#1e293b;padding:1px 5px;border-radius:3px;font-size:.78rem;font-family:'SF Mono','Consolas',monospace;color:#a5f3fc}
.tabs{display:flex;gap:4px;margin-bottom:10px;border-bottom:1px solid #1f2937;padding-bottom:8px}
.tab{padding:6px 12px;background:transparent;border:1px solid #1f2937;color:#94a3b8;border-radius:4px;cursor:pointer;font-size:.78rem;margin:0}
.tab.active{background:#2563eb;color:#fff;border-color:#2563eb}
.row{display:flex;gap:8px}
.row > * {flex:1}
.muted{color:#64748b;font-size:.78rem}
.fade-in{animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<h1>📋 道·智能任务管家</h1>
<p class="tagline">印 161 · 端到端全链路验证 · <code>:3000</code> → fleet_master <code>:7790</code> → VM/fallback · 「修之天下其德乃博」</p>

<div class="grid">
  <!-- 左: 任务建 + 健康 -->
  <div>
    <div class="card">
      <h2>新建任务 <span class="badge">CRUD</span></h2>
      <input id="title" placeholder="任务标题..." maxlength="80">
      <textarea id="desc" placeholder="描述 (可选)"></textarea>
      <select id="priority">
        <option value="low">低优先级</option>
        <option value="mid" selected>中优先级</option>
        <option value="high">高优先级</option>
      </select>
      <button onclick="addTask(false)">+ 添加</button>
      <button onclick="addTask(true)" class="ai">✨ AI 智能补 (4.7)</button>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>反代链路健康 <span class="badge">实时</span></h2>
      <div id="health-rows"><div class="muted">加载中...</div></div>
      <button onclick="refreshHealth()" class="sec" style="width:100%;margin-top:8px">↻ 刷新</button>
    </div>
  </div>

  <!-- 中: 任务列表 + AI 助手 -->
  <div>
    <div class="card">
      <h2>任务列表 <span id="task-count" class="badge">0</span></h2>
      <div id="list"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>AI 助手 <span class="badge" id="ai-mode">单模</span></h2>
      <div class="tabs">
        <button class="tab active" onclick="setMode('chat')">对话</button>
        <button class="tab" onclick="setMode('decompose')">拆任务 (4.7)</button>
        <button class="tab" onclick="setMode('creative')">创意 (gpt5.5)</button>
        <button class="tab" onclick="setMode('parallel')">双模并发</button>
      </div>
      <div class="chat" id="chat"><div class="empty">主公 · 请输入问题</div></div>
      <div class="row">
        <select id="model" style="flex:1.4">
          <option value="claude-sonnet-4-7">claude-sonnet-4-7</option>
          <option value="gpt-5-5">gpt-5-5</option>
          <option value="claude-opus-4-1">claude-opus-4-1</option>
          <option value="claude-haiku-4-5">claude-haiku-4-5</option>
          <option value="gemini-2-5-flash">gemini-2-5-flash</option>
        </select>
        <input id="message" placeholder="问 AI..." onkeydown="if(event.key==='Enter')runAi()">
      </div>
      <button onclick="runAi()" class="ai" style="width:100%">▶ 发送</button>
    </div>
  </div>

  <!-- 右: 统计 -->
  <div>
    <div class="card">
      <h2>📊 统计 <span class="badge">live</span></h2>
      <div class="stat-row"><span>总任务</span><span class="stat-val" id="s-total">0</span></div>
      <div class="stat-row"><span>已完成</span><span class="stat-val" id="s-done">0</span></div>
      <div class="stat-row"><span>待处理</span><span class="stat-val" id="s-pend">0</span></div>
      <div class="stat-row"><span>完成率</span><span class="stat-val" id="s-rate">0%</span></div>
      <div class="bar"><div class="bar-fill" id="bar" style="width:0"></div></div>
      <h3 style="font-size:.85rem;color:#94a3b8;margin:14px 0 6px">LLM 调用</h3>
      <div class="stat-row"><span>调用数</span><span class="stat-val" id="s-llm">0</span></div>
      <div class="stat-row"><span>错误</span><span class="stat-val" id="s-err">0</span></div>
      <div class="stat-row"><span>平均 ms</span><span class="stat-val" id="s-avg">0</span></div>
      <div class="stat-row"><span>routed VM</span><span class="stat-val" id="s-vm">0</span></div>
      <div class="stat-row"><span>routed fallback</span><span class="stat-val" id="s-fb">0</span></div>
      <h3 style="font-size:.85rem;color:#94a3b8;margin:14px 0 6px">按模分</h3>
      <div id="by-model" class="muted">无</div>
    </div>
  </div>
</div>

<script>
const API = '';
let tasks = [];
let mode = 'chat';
let history = [];

// ─── tasks CRUD ───
async function load() {
  try {
    const r = await fetch(API + '/api/tasks');
    const j = await r.json();
    tasks = j.tasks || [];
    renderTasks();
    refreshStats();
  } catch (e) { console.error(e); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderTasks() {
  const list = document.getElementById('list');
  document.getElementById('task-count').textContent = tasks.length;
  if (tasks.length === 0) { list.innerHTML = '<div class="empty">无任务 · 主公请新建</div>'; return; }
  list.innerHTML = tasks.map(t => `
    <div class="task ${t.priority || 'mid'} ${t.done ? 'done' : ''} fade-in">
      <div class="task-row">
        <div class="info">
          <b>${esc(t.title)}</b>
          ${t.desc ? `<div class="desc">${esc(t.desc)}</div>` : ''}
          <div class="meta">id=${t.id} · ${t.priority} · ${new Date(t.createdAt || Date.now()).toLocaleTimeString()}${t.aiHints ? ' · ✨ AI 补' : ''}</div>
        </div>
      </div>
      <div class="actions">
        <button onclick="toggle(${t.id})" class="sec">${t.done ? '↺ 撤' : '✓ 完'}</button>
        <button onclick="decompose(${t.id})" class="ai">✨ 拆</button>
        <button onclick="creative(${t.id})" class="ai">✨ 总</button>
        <button onclick="del(${t.id})" class="dan">🗑</button>
      </div>
    </div>
  `).join('');
}

async function addTask(autoAi) {
  const title = document.getElementById('title').value.trim();
  if (!title) return alert('请输入标题');
  const desc = document.getElementById('desc').value.trim();
  const priority = document.getElementById('priority').value;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = autoAi ? '... AI 补中' : '... 添加中';
  try {
    const r = await fetch(API + '/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, desc, priority, autoAi })
    });
    if (!r.ok) {
      const e = await r.json(); alert('添加失败: ' + (e.error || r.status));
    } else {
      document.getElementById('title').value = '';
      document.getElementById('desc').value = '';
      load();
    }
  } finally {
    btn.disabled = false;
    btn.textContent = autoAi ? '✨ AI 智能补 (4.7)' : '+ 添加';
  }
}

async function toggle(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  await fetch(API + '/api/tasks/' + id, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ done: !t.done })
  });
  load();
}

async function del(id) {
  if (!confirm('删除此任务?')) return;
  await fetch(API + '/api/tasks/' + id, { method: 'DELETE' });
  load();
}

// ─── AI 真用 ───
async function decompose(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  appendChat('user', `[拆解] ${t.title}`);
  setMode('decompose');
  const t0 = Date.now();
  try {
    const r = await fetch(API + '/api/llm/decompose', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: t.title, desc: t.desc })
    });
    const j = await r.json();
    if (j.ok && j.subtasks && j.subtasks.length) {
      let msg = `<b>已拆为 ${j.subtasks.length} 个子任务</b> (${j.model || '?'} · ${j.ms}ms · ${j.routed || '?'}):<br>`;
      msg += j.subtasks.map((s, i) => `${i + 1}. ${esc(s.title)} <code>${s.priority || 'mid'}</code>`).join('<br>');
      msg += `<br><button onclick='importSubs(${JSON.stringify(j.subtasks).replace(/'/g, "&#39;")})' class="ai" style="margin-top:8px">→ 导入为新任务</button>`;
      appendChatHtml('ai', msg);
    } else {
      appendChat('err', '拆解失败: ' + (j.error || j.raw || '?'));
    }
  } catch (e) {
    appendChat('err', '✗ ' + e.message);
  }
}

async function importSubs(subtasks) {
  for (const s of subtasks) {
    await fetch(API + '/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: s.title, priority: s.priority || 'mid' })
    });
  }
  load();
  appendChat('ai', `✓ 已导入 ${subtasks.length} 个子任务`);
}

async function creative(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  appendChat('user', `[创意总结] ${t.title}`);
  setMode('creative');
  try {
    const r = await fetch(API + '/api/llm/creative', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: `给"${t.title}"这个任务写一个 30 字内生动的总结` })
    });
    const j = await r.json();
    if (j.ok) appendChat('ai', `${j.content} <span class="muted">(${j.model} · ${j.ms}ms · ${j.routed || '?'})</span>`);
    else appendChat('err', '✗ ' + (j.error || '?'));
  } catch (e) { appendChat('err', '✗ ' + e.message); }
}

// ─── chat 区 ───
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  Array.from(document.querySelectorAll('.tab')).find(t => t.textContent.toLowerCase().includes(
    m === 'chat' ? '对话' : m === 'decompose' ? '拆' : m === 'creative' ? '创意' : '双模'
  ))?.classList.add('active');
  document.getElementById('ai-mode').textContent = m === 'parallel' ? '双模' : (m === 'decompose' ? '4.7 推理' : (m === 'creative' ? 'gpt5.5 创意' : '单模'));
}

function appendChat(role, text) {
  const box = document.getElementById('chat');
  if (box.querySelector('.empty')) box.innerHTML = '';
  const cls = role === 'err' ? 'err' : role === 'user' ? 'user' : 'ai';
  const r = role === 'user' ? '主公' : (role === 'err' ? '错' : 'AI');
  const div = document.createElement('div');
  div.className = 'msg ' + cls + ' fade-in';
  div.innerHTML = `<div class="role"><span>${r}</span><span>${new Date().toLocaleTimeString()}</span></div><div>${esc(text)}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function appendChatHtml(role, html) {
  const box = document.getElementById('chat');
  if (box.querySelector('.empty')) box.innerHTML = '';
  const cls = role === 'err' ? 'err' : role === 'user' ? 'user' : 'ai';
  const r = role === 'user' ? '主公' : (role === 'err' ? '错' : 'AI');
  const div = document.createElement('div');
  div.className = 'msg ' + cls + ' fade-in';
  div.innerHTML = `<div class="role"><span>${r}</span><span>${new Date().toLocaleTimeString()}</span></div><div>${html}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function runAi() {
  const msg = document.getElementById('message').value.trim();
  if (!msg) return;
  document.getElementById('message').value = '';
  const model = document.getElementById('model').value;
  appendChat('user', msg);

  try {
    let endpoint, body;
    if (mode === 'parallel') {
      endpoint = '/api/llm/parallel';
      body = { prompt: msg };
    } else if (mode === 'decompose') {
      endpoint = '/api/llm/decompose';
      body = { title: msg };
    } else if (mode === 'creative') {
      endpoint = '/api/llm/creative';
      body = { prompt: msg };
    } else {
      endpoint = '/api/llm/chat';
      body = { message: msg, model, history: history.slice(-6) };
    }

    const r = await fetch(API + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const j = await r.json();

    if (mode === 'parallel') {
      const r1 = j.results['claude-sonnet-4-7'];
      const r2 = j.results['gpt-5-5'];
      let html = '';
      html += `<div style="background:#0c1929;padding:8px;border-radius:4px;margin-bottom:6px"><b style="color:#60a5fa">claude-sonnet-4-7 (${r1.ms}ms · ${r1.routed || '?'})</b><br>${esc(r1.ok ? r1.content : '✗ ' + r1.error)}</div>`;
      html += `<div style="background:#0c1929;padding:8px;border-radius:4px"><b style="color:#a78bfa">gpt-5-5 (${r2.ms}ms · ${r2.routed || '?'})</b><br>${esc(r2.ok ? r2.content : '✗ ' + r2.error)}</div>`;
      appendChatHtml('ai', html);
    } else if (mode === 'decompose') {
      if (j.ok && j.subtasks && j.subtasks.length) {
        let txt = `<b>${j.subtasks.length} 个子任务</b> (${j.model} · ${j.ms}ms):<br>`;
        txt += j.subtasks.map((s, i) => `${i + 1}. ${esc(s.title)} <code>${s.priority}</code>`).join('<br>');
        txt += `<br><button onclick='importSubs(${JSON.stringify(j.subtasks).replace(/'/g, "&#39;")})' class="ai" style="margin-top:8px">→ 导入</button>`;
        appendChatHtml('ai', txt);
      } else { appendChat('err', '拆解失败: ' + (j.error || j.raw || '?')); }
    } else if (j.ok) {
      appendChatHtml('ai', `${esc(j.content)} <span class="muted">(${j.model || model} · ${j.ms}ms · ${j.routed || '?'})</span>`);
      if (mode === 'chat') {
        history.push({ role: 'user', content: msg });
        history.push({ role: 'assistant', content: j.content });
      }
    } else {
      appendChat('err', '✗ ' + (j.error || JSON.stringify(j).slice(0, 100)));
    }
  } catch (e) {
    appendChat('err', '✗ ' + e.message);
  }
  refreshStats();
}

// ─── 健康 ───
async function refreshHealth() {
  try {
    const r = await fetch(API + '/api/llm/health');
    const j = await r.json();
    const f = j.fleet_master || {};
    const p = j.dao_proxy || {};
    document.getElementById('health-rows').innerHTML = `
      <div class="health"><span class="dot ${f.ok ? 'g' : 'r'}"></span>fleet_master <code>:7790</code> · ${f.ok ? `total=${f.fleet?.total || 0} alive=${f.fleet?.alive || 0}` : (f.error || '?')}</div>
      <div class="health"><span class="dot ${p.ok ? 'g' : 'r'}"></span>dao_proxy <code>:7780</code> · ${p.ok ? `pool=${p.pool || 0}` : (p.error || '?')}</div>
      <div class="health" style="border:none"><span class="dot y"></span><code>${j.daoBase || '?'}</code></div>
    `;
  } catch (e) {
    document.getElementById('health-rows').innerHTML = `<div class="muted">✗ ${e.message}</div>`;
  }
}

// ─── 统计 ───
async function refreshStats() {
  try {
    const r = await fetch(API + '/api/stats');
    const j = await r.json();
    document.getElementById('s-total').textContent = j.tasks.total;
    document.getElementById('s-done').textContent = j.tasks.done;
    document.getElementById('s-pend').textContent = j.tasks.pending;
    document.getElementById('s-rate').textContent = j.tasks.rate + '%';
    document.getElementById('bar').style.width = j.tasks.rate + '%';
    document.getElementById('s-llm').textContent = j.llm.calls;
    document.getElementById('s-err').textContent = j.llm.errors;
    document.getElementById('s-avg').textContent = j.llm.avgMs;
    document.getElementById('s-vm').textContent = j.llm.routes.vm;
    document.getElementById('s-fb').textContent = j.llm.routes.fallback;
    const bm = j.llm.byModel || {};
    const keys = Object.keys(bm);
    document.getElementById('by-model').innerHTML = keys.length === 0 ? '无' :
      keys.map(k => `<div class="stat-row"><span style="font-size:.78rem">${esc(k)}</span><span class="stat-val">${bm[k]}</span></div>`).join('');
  } catch {}
}

// ─── 起 ───
load();
refreshHealth();
setInterval(refreshHealth, 10000);
setInterval(refreshStats, 5000);
</script>
</body>
</html>
