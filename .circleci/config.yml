# .circleci/config.yml · dao-vm loop · 印274
# 「爰有奇器，是生萬象。八卦甲子，神機鬼藏。」── 阴符经
# CircleCI Free: 6000min/月 · 2vCPU/4GB · 无需CC
# 每285min自触发 → 永续在线

version: 2.1

parameters:
  dao_vm_slot:
    type: string
    default: "circleci"

jobs:
  dao-vm:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    environment:
      VM_SLOT: << pipeline.parameters.dao_vm_slot >>
      VM_PORT: "7862"
    steps:
      - checkout

      - run:
          name: Install cloudflared
          command: |
            wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
              -O /tmp/cloudflared && chmod +x /tmp/cloudflared
            sudo mv /tmp/cloudflared /usr/local/bin/cloudflared
            cloudflared --version

      - run:
          name: Start VM + Tunnel
          no_output_timeout: 290m
          command: |
            bash scripts/dao_vm_gha_bootstrap.sh circleci 280

      - run:
          name: Trigger next run
          when: always
          command: |
            curl -sf -X POST \
              -H "Circle-Token: $CIRCLECI_TOKEN" \
              -H "Content-Type: application/json" \
              "https://circleci.com/api/v2/project/gh/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pipeline" \
              -d '{"branch":"main"}' && echo "Next pipeline triggered" || echo "Trigger failed"

workflows:
  dao-vm-loop:
    jobs:
      - dao-vm
