# .build.yml · Sourcehut builds.sr.ht · dao-vm · 印275
# builds.sr.ht: OSS免费无限 · 2vCPU/4GB · SSH直接接入 · 无需CC
image: ubuntu/latest
packages:
  - nodejs
  - npm
  - wget
  - curl
environment:
  VM_SLOT: sourcehut
  DURATION_MIN: "55"
sources:
  - https://github.com/zhouyoukang/windsurf-assistant
tasks:
  - setup: |
      cd windsurf-assistant
      wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O /usr/local/bin/cloudflared
      chmod +x /usr/local/bin/cloudflared
      cloudflared --version
  - run_vm: |
      cd windsurf-assistant
      bash scripts/dao_vm_gha_bootstrap.sh sourcehut 55
